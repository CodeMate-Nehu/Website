<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMate | Build. Connect. Grow.</title>
    <meta name="description" content="Empowering students for placement prep, higher studies, and career growth through community and resources.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <main id="main-content">
        <div id="hero-container"></div>
        <div class="page-grid-bg">
            <svg aria-hidden="true" class="grid-pattern-svg">
                <defs>
                    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse" x="-1" y="-1">
                        <path d="M.5 40V.5H40" fill="none" />
                    </pattern>
                </defs>
                <rect width="100%" height="100%" stroke-width="0" fill="url(#grid-pattern)" />
                <svg x="-1" y="-1" class="overflow-visible">
                    <rect stroke-width="0" width="39" height="39" x="161" y="161" />
                    <rect stroke-width="0" width="39" height="39" x="201" y="41" />
                    <rect stroke-width="0" width="39" height="39" x="321" y="81" />
                    <rect stroke-width="0" width="39" height="39" x="201" y="121" />
                    <rect stroke-width="0" width="39" height="39" x="201" y="201" />
                    <rect stroke-width="0" width="39" height="39" x="401" y="401" />
                    <rect stroke-width="0" width="39" height="39" x="481" y="601" />
                    <rect stroke-width="0" width="39" height="39" x="601" y="401" />
                    <rect stroke-width="0" width="39" height="39" x="401" y="601" />
                </svg>
            </svg>
            <div id="resources-container"></div>
            <div id="members-container"></div>
            <div id="events-container"></div>
            <div id="impact-container"></div>
        </div>
    </main>

    <div id="footer-container"></div>
    <div id="chatbot-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
